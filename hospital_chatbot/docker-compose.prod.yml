version: '3.9'

services:
  nextjs:
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://YOUR_DOMAIN/api

  nginx:
    volumes:
      - ./deployment/nginx/conf.d/site-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/nginx/certs:/etc/nginx/certs:ro
      - ./deployment/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
